<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>APT Exchange — Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:       #07080a;
      --panel:    #0e1014;
      --panel2:   #12151b;
      --border:   #1a1e26;
      --muted:    #252c38;
      --text:     #dce8f0;
      --dim:      #485468;
      --green:    #22d07a;
      --red:      #f04060;
      --accent:   #f0c040;
      --blue:     #4a9eff;
      --pending:  #f0c040;
      --matched:  #22d07a;
      --rejected: #f04060;
      --cancelled:#6b7a8d;
      --mono:     'DM Mono', monospace;
      --body:     'DM Sans', sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--text);
      font-family: var(--body); font-size: 13px; min-height: 100vh;
    }

    /* ── Toast ── */
    #toasts {
      position: fixed; top: 12px; right: 12px; z-index: 9999;
      display: flex; flex-direction: column; gap: 8px; pointer-events: none;
    }
    .toast {
      background: var(--panel); border-radius: 7px;
      padding: 10px 14px; min-width: 220px; max-width: 300px;
      pointer-events: all; border-left: 3px solid var(--green);
      box-shadow: 0 6px 24px rgba(0,0,0,0.5);
      animation: t-in 0.25s ease-out forwards;
    }
    .toast.error   { border-left-color: var(--red); }
    .toast.warning { border-left-color: var(--accent); }
    .toast-title { font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em; margin-bottom: 3px; color: var(--green); }
    .toast.error .toast-title   { color: var(--red); }
    .toast.warning .toast-title { color: var(--accent); }
    .toast-body { font-size: 12px; color: var(--text); line-height: 1.4; }
    @keyframes t-in  { from{opacity:0;transform:translateX(12px)} to{opacity:1;transform:none} }
    @keyframes t-out { from{opacity:1;max-height:80px;padding:10px 14px} to{opacity:0;max-height:0;padding:0;margin:0} }
    .toast.out { animation: t-out 0.25s ease-in forwards; }

    /* ── Topbar ── */
    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 14px; border-bottom: 1px solid var(--border);
      background: var(--panel); position: sticky; top: 0; z-index: 50;
    }
    .tl { display: flex; align-items: center; gap: 10px; }
    .back {
      font-family: var(--mono); font-size: 10px; color: var(--dim);
      text-decoration: none; border: 1px solid var(--border);
      border-radius: 4px; padding: 4px 8px; transition: all 0.15s;
    }
    .back:hover { color: var(--text); border-color: var(--muted); }
    .admin-chip {
      display: flex; align-items: center; gap: 6px;
      background: rgba(240,192,64,0.06); border: 1px solid rgba(240,192,64,0.22);
      border-radius: 5px; padding: 4px 10px;
    }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 5px var(--accent); animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .chip-name { font-family: var(--mono); font-size: 11px; color: var(--accent); letter-spacing: 0.06em; }
    .ws-tag { font-family: var(--mono); font-size: 10px; color: var(--dim); }

    /* ── Body ── */
    .body { padding: 14px; }

    /* ── Stats ── */
    .stats {
      display: grid; grid-template-columns: repeat(6, 1fr);
      gap: 8px; margin-bottom: 14px;
    }
    .stat {
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 7px; padding: 10px 12px;
    }
    .stat-label { font-family: var(--mono); font-size: 8px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--dim); margin-bottom: 4px; }
    .stat-val { font-family: var(--mono); font-size: 22px; font-weight: 500; color: var(--text); }
    .stat-val.c-p { color: var(--pending); }
    .stat-val.c-m { color: var(--matched); }
    .stat-val.c-r { color: var(--rejected); }
    .stat-val.c-t { color: var(--blue); }

    /* ── Two column ── */
    .cols { display: grid; grid-template-columns: 1fr 260px; gap: 12px; align-items: start; }

    /* ── Card ── */
    .card { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; margin-bottom: 12px; }
    .card:last-child { margin-bottom: 0; }
    .card-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 9px 14px; border-bottom: 1px solid var(--border); background: var(--bg);
    }
    .card-title {
      font-family: var(--mono); font-size: 9px; letter-spacing: 0.2em;
      color: var(--dim); text-transform: uppercase;
      display: flex; align-items: center; gap: 6px;
    }
    .cnt { background: var(--muted); border-radius: 8px; padding: 1px 6px; font-size: 9px; color: var(--text); }

    /* Filters */
    .filters { display: flex; gap: 5px; }
    .fpill {
      font-family: var(--mono); font-size: 9px; letter-spacing: 0.06em;
      text-transform: uppercase; padding: 3px 9px; border-radius: 3px;
      border: 1px solid var(--border); background: transparent;
      color: var(--dim); cursor: pointer; transition: all 0.12s;
    }
    .fpill:hover { color: var(--text); border-color: var(--muted); }
    .fpill.active { color: var(--accent); border-color: rgba(240,192,64,0.4); background: rgba(240,192,64,0.05); }

    /* Table */
    table { width: 100%; border-collapse: collapse; }
    thead th {
      font-family: var(--mono); font-size: 9px; letter-spacing: 0.15em;
      text-transform: uppercase; color: var(--dim); text-align: left;
      padding: 8px 14px; border-bottom: 1px solid var(--border);
    }
    tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(255,255,255,0.015); }
    tbody td { font-family: var(--mono); font-size: 11px; padding: 8px 14px; color: var(--text); vertical-align: middle; }
    td.dim { color: var(--dim); font-size: 10px; }

    .cp { font-size: 10px; padding: 2px 7px; border-radius: 3px; background: rgba(255,255,255,0.05); color: var(--text); }
    .type-tag { font-size: 9px; font-weight: 500; letter-spacing: 0.1em; padding: 2px 6px; border-radius: 3px; }
    .type-tag.BUY  { background: rgba(34,208,122,0.1); color: var(--green); }
    .type-tag.SELL { background: rgba(240,64,96,0.1);  color: var(--red); }
    .st-tag { font-size: 9px; font-weight: 500; letter-spacing: 0.07em; text-transform: uppercase; padding: 2px 7px; border-radius: 3px; display: inline-flex; align-items: center; gap: 4px; }
    .st-tag::before { content:''; width:4px; height:4px; border-radius:50%; }
    .st-tag.pending   { background:rgba(240,192,64,0.1);  color:var(--pending); }
    .st-tag.pending::before   { background:var(--pending); }
    .st-tag.matched   { background:rgba(34,208,122,0.1);  color:var(--matched); }
    .st-tag.matched::before   { background:var(--matched); }
    .st-tag.rejected  { background:rgba(240,64,96,0.1);   color:var(--rejected); }
    .st-tag.rejected::before  { background:var(--rejected); }
    .st-tag.cancelled { background:rgba(107,122,141,0.1); color:var(--cancelled); }
    .st-tag.cancelled::before { background:var(--cancelled); }

    .act-btn { font-family: var(--mono); font-size: 9px; padding: 3px 8px; border-radius: 3px; border: 1px solid rgba(240,64,96,0.3); background: transparent; color: var(--red); cursor: pointer; transition: all 0.12s; }
    .act-btn:hover { background: rgba(240,64,96,0.08); }
    .no-act { font-family: var(--mono); font-size: 10px; color: var(--dim); }

    .empty-row td { text-align: center; padding: 28px; color: var(--dim); font-size: 11px; }

    /* Sidebar */
    .sidebar { display: flex; flex-direction: column; gap: 12px; }

    .stock-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 14px; border-bottom: 1px solid var(--border);
    }
    .stock-row:last-child { border-bottom: none; }
    .sr-sym { font-family: var(--mono); font-size: 11px; font-weight: 500; }
    .sr-co  { font-size: 10px; color: var(--dim); margin-top: 1px; }
    .sr-price { font-family: var(--mono); font-size: 12px; color: var(--green); text-align: right; }
    .sr-qty { font-size: 10px; color: var(--dim); text-align: right; margin-top: 1px; }

    .trade-row-s {
      display: flex; align-items: center; justify-content: space-between;
      padding: 7px 14px; border-bottom: 1px solid var(--border);
      font-family: var(--mono); font-size: 10px;
    }
    .trade-row-s:last-child { border-bottom: none; }
    .ts-sym { color: var(--text); font-weight: 500; }
    .ts-p   { color: var(--green); }
    .ts-q   { color: var(--dim); }
    .ts-t   { color: var(--dim); font-size: 9px; }

    .log-wrap { max-height: 220px; overflow-y: auto; }
    .log-wrap::-webkit-scrollbar { width: 3px; }
    .log-wrap::-webkit-scrollbar-thumb { background: var(--muted); }

    .log-entry {
      display: flex; align-items: baseline; gap: 8px;
      padding: 6px 14px; border-bottom: 1px solid var(--border);
      font-family: var(--mono); font-size: 10px;
      animation: sl-in 0.2s ease-out;
    }
    .log-entry:last-child { border-bottom: none; }
    @keyframes sl-in { from{opacity:0;transform:translateY(-3px)} to{opacity:1;transform:none} }
    .lg-t  { color: var(--dim); font-size: 9px; flex-shrink: 0; }
    .lg-op { font-weight: 500; width: 48px; flex-shrink: 0; }
    .lg-op.INSERT { color: var(--green); }
    .lg-op.UPDATE { color: var(--blue); }
    .lg-op.TRADE  { color: var(--accent); }
    .lg-op.DELETE { color: var(--red); }
    .lg-msg { color: var(--dim); }
    .lg-msg strong { color: var(--text); font-weight: 400; }

    .log-empty { padding: 16px; text-align: center; font-family: var(--mono); font-size: 10px; color: var(--dim); }

    .clear-btn { font-family: var(--mono); font-size: 9px; color: var(--dim); background: none; border: 1px solid var(--border); border-radius: 3px; padding: 3px 8px; cursor: pointer; transition: all 0.12s; }
    .clear-btn:hover { color: var(--text); border-color: var(--muted); }

    /* Flash */
    @keyframes fl-g { 0%{background:rgba(34,208,122,0.1)} 100%{background:transparent} }
    @keyframes fl-b { 0%{background:rgba(74,158,255,0.1)} 100%{background:transparent} }
    @keyframes fl-r { 0%{background:rgba(240,64,96,0.1)}  100%{background:transparent} }
    tr.fl-new { animation: fl-g 0.8s ease-out; }
    tr.fl-upd { animation: fl-b 0.8s ease-out; }
    tr.fl-del { animation: fl-r 0.8s ease-out; }
  </style>
</head>
<body>

<div id="toasts"></div>

<div class="topbar">
  <div class="tl">
    <a class="back" href="login.html">← Back</a>
    <div class="admin-chip">
      <div class="dot"></div>
      <span class="chip-name">ADMIN — EXCHANGE CONTROL</span>
    </div>
  </div>
  <span class="ws-tag" id="ws-tag">CONNECTING...</span>
</div>

<div class="body">

  <div class="stats">
    <div class="stat"><div class="stat-label">Total Orders</div><div class="stat-val" id="s-total">0</div></div>
    <div class="stat"><div class="stat-label">Pending</div><div class="stat-val c-p" id="s-pending">0</div></div>
    <div class="stat"><div class="stat-label">Matched</div><div class="stat-val c-m" id="s-matched">0</div></div>
    <div class="stat"><div class="stat-label">Rejected</div><div class="stat-val c-r" id="s-rejected">0</div></div>
    <div class="stat"><div class="stat-label">Cancelled</div><div class="stat-val" id="s-cancelled">0</div></div>
    <div class="stat"><div class="stat-label">Trades</div><div class="stat-val c-t" id="s-trades">0</div></div>
  </div>

  <div class="cols">

    <!-- Main orders table -->
    <div>
      <div class="card">
        <div class="card-head">
          <span class="card-title">All Orders <span class="cnt" id="cnt-orders">0</span></span>
          <div class="filters">
            <button class="fpill active" onclick="setFilter('all')">All</button>
            <button class="fpill" onclick="setFilter('pending')">Pending</button>
            <button class="fpill" onclick="setFilter('matched')">Matched</button>
            <button class="fpill" onclick="setFilter('rejected')">Rejected</button>
            <button class="fpill" onclick="setFilter('cancelled')">Cancelled</button>
          </div>
        </div>
        <table>
          <thead>
            <tr><th>ID</th><th>Client</th><th>Type</th><th>Stock</th><th>Qty</th><th>Price</th><th>Status</th><th>Time</th><th>Action</th></tr>
          </thead>
          <tbody id="orders-body">
            <tr class="empty-row"><td colspan="9">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Sidebar -->
    <div class="sidebar">

      <div class="card">
        <div class="card-head"><span class="card-title">Market Prices</span></div>
        <div id="stock-list"><div class="log-empty">Loading...</div></div>
      </div>

      <div class="card">
        <div class="card-head">
          <span class="card-title">Trades <span class="cnt" id="cnt-trades">0</span></span>
        </div>
        <div id="trades-list"><div class="log-empty">No trades</div></div>
      </div>

      <div class="card">
        <div class="card-head">
          <span class="card-title">Live Log</span>
          <button class="clear-btn" onclick="clearLog()">Clear</button>
        </div>
        <div class="log-wrap" id="event-log">
          <div class="log-empty">Waiting...</div>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
const API = 'http://localhost:8000';
const WS  = 'ws://localhost:8000/ws';

let orders = {}, stocks = {}, trades = [];
let activeFilter = 'all';

function toast(title, body, type = 'info') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.innerHTML = `<div class="toast-title">${title}</div><div class="toast-body">${body}</div>`;
  document.getElementById('toasts').appendChild(el);
  setTimeout(() => { el.classList.add('out'); setTimeout(() => el.remove(), 260); }, 4000);
}

function setFilter(f) {
  activeFilter = f;
  document.querySelectorAll('.fpill').forEach(b =>
    b.classList.toggle('active', b.textContent.toLowerCase() === f || (f==='all' && b.textContent==='All'))
  );
  renderOrders();
}

async function init() {
  const [or, sr, tr] = await Promise.all([
    fetch(`${API}/orders`), fetch(`${API}/stocks`), fetch(`${API}/trades`)
  ]);
  (await or.json()).forEach(o => { orders[o.id] = o; });
  (await sr.json()).forEach(s => { stocks[s.symbol] = s; });
  trades = await tr.json();
  renderOrders(); renderStocks(); renderTrades(); updateStats();
}

function renderOrders(flashId = null, cls = '') {
  let list = Object.values(orders).sort((a,b) => new Date(b.updated_at) - new Date(a.updated_at));
  if (activeFilter !== 'all') list = list.filter(o => o.status === activeFilter);
  document.getElementById('cnt-orders').textContent = list.length;

  const tbody = document.getElementById('orders-body');
  if (!list.length) {
    tbody.innerHTML = `<tr class="empty-row"><td colspan="9">No orders${activeFilter!=='all'?' — '+activeFilter:''}</td></tr>`;
    return;
  }
  tbody.innerHTML = list.map(o => `
    <tr id="row-${o.id}" class="${flashId==o.id?cls:''}">
      <td class="dim">#${o.id}</td>
      <td><span class="cp">${esc(o.placed_by)}</span></td>
      <td><span class="type-tag ${o.order_type}">${o.order_type}</span></td>
      <td>${esc(o.stock_symbol)}</td>
      <td>${o.quantity}</td>
      <td>₹${parseFloat(o.price).toFixed(2)}</td>
      <td><span class="st-tag ${o.status}">${o.status}</span></td>
      <td class="dim">${new Date(o.updated_at).toLocaleTimeString()}</td>
      <td>${o.status==='pending'
        ? `<button class="act-btn" onclick="rejectOrder(${o.id})">Reject</button>`
        : '<span class="no-act">—</span>'}</td>
    </tr>`).join('');
}

function updateStats() {
  const v = Object.values(orders);
  document.getElementById('s-total').textContent     = v.length;
  document.getElementById('s-pending').textContent   = v.filter(o=>o.status==='pending').length;
  document.getElementById('s-matched').textContent   = v.filter(o=>o.status==='matched').length;
  document.getElementById('s-rejected').textContent  = v.filter(o=>o.status==='rejected').length;
  document.getElementById('s-cancelled').textContent = v.filter(o=>o.status==='cancelled').length;
  document.getElementById('s-trades').textContent    = trades.length;
}

function renderStocks() {
  const el = document.getElementById('stock-list');
  const list = Object.values(stocks);
  if (!list.length) { el.innerHTML = '<div class="log-empty">No stocks</div>'; return; }
  el.innerHTML = list.map(s => `
    <div class="stock-row">
      <div><div class="sr-sym">${s.symbol}</div><div class="sr-co">${s.company_name}</div></div>
      <div><div class="sr-price">₹${parseFloat(s.last_price).toFixed(2)}</div><div class="sr-qty">Avl: ${s.available_qty}</div></div>
    </div>`).join('');
}

function renderTrades() {
  const el = document.getElementById('trades-list');
  document.getElementById('cnt-trades').textContent = trades.length;
  if (!trades.length) { el.innerHTML = '<div class="log-empty">No trades</div>'; return; }
  el.innerHTML = trades.slice(0,12).map(t => `
    <div class="trade-row-s">
      <span class="ts-sym">${t.stock_symbol}</span>
      <span class="ts-p">₹${parseFloat(t.price).toFixed(2)}</span>
      <span class="ts-q">×${t.quantity}</span>
      <span class="ts-t">${new Date(t.executed_at).toLocaleTimeString()}</span>
    </div>`).join('');
}

async function rejectOrder(id) {
  const res = await fetch(`${API}/orders/${id}/status`, {
    method: 'PATCH', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ status: 'rejected' })
  });
  const data = await res.json();
  if (data.error) toast('Error', data.error, 'error');
  else toast('Order Rejected', `Order #${id} rejected`, 'warning');
}

function logEvent(op, label, msg) {
  const log = document.getElementById('event-log');
  const empty = log.querySelector('.log-empty');
  if (empty) empty.remove();
  const e = document.createElement('div');
  e.className = 'log-entry';
  e.innerHTML = `<span class="lg-t">${new Date().toLocaleTimeString()}</span><span class="lg-op ${op}">${label}</span><span class="lg-msg">${msg}</span>`;
  log.prepend(e);
  const all = log.querySelectorAll('.log-entry');
  if (all.length > 80) all[all.length-1].remove();
}

function clearLog() {
  document.getElementById('event-log').innerHTML = '<div class="log-empty">Cleared</div>';
}

function handleEvent(raw) {
  let evt; try { evt = JSON.parse(raw); } catch { return; }
  const { table, operation, data } = evt;

  if (table === 'stocks') {
    stocks[data.symbol] = data;
    renderStocks();
    return;
  }

  if (table === 'trades') {
    trades.unshift(data);
    if (trades.length > 50) trades.pop();
    renderTrades(); updateStats();
    logEvent('TRADE', 'TRADE', `<strong>${data.stock_symbol}</strong> ×${data.quantity} @ ₹${parseFloat(data.price).toFixed(2)}`);
    return;
  }

  if (table === 'orders') {
    if (operation === 'INSERT') {
      orders[data.id] = data;
      renderOrders(data.id, 'fl-new');
      logEvent('INSERT', 'ORDER', `<strong>${data.placed_by}</strong> ${data.order_type} ${data.quantity}×<strong>${data.stock_symbol}</strong> @ ₹${parseFloat(data.price).toFixed(2)}`);
    } else if (operation === 'UPDATE') {
      orders[data.id] = data;
      renderOrders(data.id, 'fl-upd');
      logEvent('UPDATE', 'UPDATE', `Order #${data.id} (${data.placed_by}) → <strong>${data.status}</strong>`);
    } else if (operation === 'DELETE') {
      renderOrders(data.id, 'fl-del');
      setTimeout(() => { delete orders[data.id]; renderOrders(); }, 700);
      logEvent('DELETE', 'DELETE', `Order #${data.id} removed`);
    }
    updateStats();
  }
}

let ws;
function connect() {
  ws = new WebSocket(WS);
  ws.onopen    = () => { document.getElementById('ws-tag').textContent = 'LIVE ●'; };
  ws.onmessage = e => handleEvent(e.data);
  ws.onclose   = () => { document.getElementById('ws-tag').textContent = 'DISCONNECTED'; setTimeout(connect, 3000); };
  ws.onerror   = () => ws.close();
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

init(); connect();
</script>
</body>
</html>
