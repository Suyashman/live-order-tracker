<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>APT — Live Order Feed</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:         #0a0c0f;
      --surface:    #111418;
      --border:     #1e2530;
      --muted:      #3a4455;
      --text:       #c8d4e0;
      --text-dim:   #5a6a7e;
      --accent:     #00d4aa;
      --accent-dim: #00a882;
      --pending:    #f5a623;
      --shipped:    #4a9eff;
      --delivered:  #00d4aa;
      --deleted:    #ff4d6a;
      --mono:       'IBM Plex Mono', monospace;
      --sans:       'IBM Plex Sans', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Subtle grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.3;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 24px;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 40px;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--border);
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .brand-name {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.2em;
      color: var(--accent);
      text-transform: uppercase;
    }

    h1 {
      font-family: var(--mono);
      font-size: 22px;
      font-weight: 600;
      color: #e8f0f8;
      letter-spacing: -0.02em;
    }

    h1 span {
      color: var(--text-dim);
      font-weight: 400;
    }

    /* ── Status indicator ── */
    .status-bar {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
    }

    .ws-status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.08em;
      color: var(--text-dim);
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--muted);
      transition: background 0.3s;
    }

    .dot.connected {
      background: var(--accent);
      box-shadow: 0 0 6px var(--accent);
      animation: pulse 2s infinite;
    }

    .dot.error { background: var(--deleted); }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    #last-update {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-dim);
    }

    /* ── Stats row ── */
    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 28px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 14px 16px;
    }

    .stat-label {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.12em;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .stat-value {
      font-family: var(--mono);
      font-size: 22px;
      font-weight: 600;
      color: #e8f0f8;
    }

    .stat-value.pending  { color: var(--pending); }
    .stat-value.shipped  { color: var(--shipped); }
    .stat-value.delivered{ color: var(--delivered); }

    /* ── Event log ── */
    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .panel-title {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.15em;
      color: var(--text-dim);
      text-transform: uppercase;
    }

    .clear-btn {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.08em;
      color: var(--text-dim);
      background: none;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 4px 10px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .clear-btn:hover {
      color: var(--text);
      border-color: var(--muted);
    }

    /* ── Table ── */
    .table-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 28px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead th {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-dim);
      text-align: left;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
    }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }

    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(255,255,255,0.02); }

    tbody td {
      font-family: var(--mono);
      font-size: 12px;
      padding: 13px 16px;
      color: var(--text);
      vertical-align: middle;
    }

    td.id-col  { color: var(--text-dim); width: 60px; }
    td.name-col { font-weight: 500; color: #d8e8f4; }
    td.time-col { color: var(--text-dim); font-size: 11px; }

    /* ── Status badge ── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 3px 9px;
      border-radius: 3px;
    }

    .badge::before {
      content: '';
      width: 5px;
      height: 5px;
      border-radius: 50%;
    }

    .badge.pending   { background: rgba(245,166,35,0.12);  color: var(--pending);   }
    .badge.pending::before   { background: var(--pending); }
    .badge.shipped   { background: rgba(74,158,255,0.12);  color: var(--shipped);   }
    .badge.shipped::before   { background: var(--shipped); }
    .badge.delivered { background: rgba(0,212,170,0.12);   color: var(--delivered); }
    .badge.delivered::before { background: var(--delivered); }

    /* ── Flash animation on new/updated row ── */
    @keyframes flash-in {
      0%   { background: rgba(0, 212, 170, 0.12); }
      100% { background: transparent; }
    }

    @keyframes flash-delete {
      0%   { background: rgba(255, 77, 106, 0.12); }
      100% { background: transparent; }
    }

    tr.flash-new    { animation: flash-in     0.8s ease-out; }
    tr.flash-delete { animation: flash-delete 0.8s ease-out; }

    /* ── Event log ── */
    #event-log {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0;
      max-height: 220px;
      overflow-y: auto;
      font-family: var(--mono);
      font-size: 11px;
    }

    #event-log::-webkit-scrollbar { width: 4px; }
    #event-log::-webkit-scrollbar-track { background: transparent; }
    #event-log::-webkit-scrollbar-thumb { background: var(--muted); border-radius: 2px; }

    .log-entry {
      display: flex;
      align-items: baseline;
      gap: 12px;
      padding: 9px 16px;
      border-bottom: 1px solid var(--border);
      animation: slide-in 0.25s ease-out;
    }

    .log-entry:last-child { border-bottom: none; }

    @keyframes slide-in {
      from { opacity: 0; transform: translateY(-4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .log-time { color: var(--text-dim); flex-shrink: 0; font-size: 10px; }

    .log-op {
      font-weight: 600;
      flex-shrink: 0;
      width: 52px;
    }

    .log-op.INSERT   { color: var(--accent); }
    .log-op.UPDATE   { color: var(--shipped); }
    .log-op.DELETE   { color: var(--deleted); }

    .log-msg { color: var(--text-dim); }
    .log-msg strong { color: var(--text); font-weight: 500; }

    .empty-state {
      padding: 32px;
      text-align: center;
      color: var(--text-dim);
      font-family: var(--mono);
      font-size: 12px;
    }

    /* ── Connection banner ── */
    #conn-banner {
      display: none;
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255, 77, 106, 0.15);
      border: 1px solid var(--deleted);
      border-radius: 6px;
      padding: 10px 20px;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--deleted);
      z-index: 100;
    }
  </style>
</head>
<body>

<div class="container">

  <!-- Header -->
  <header>
    <div class="brand">
      <span class="brand-name">APT · Atypical Technologies</span>
      <h1>Live Order <span>Feed</span></h1>
    </div>
    <div class="status-bar">
      <div class="ws-status">
        <div class="dot" id="dot"></div>
        <span id="ws-label">CONNECTING</span>
      </div>
      <span id="last-update">—</span>
    </div>
  </header>

  <!-- Stats -->
  <div class="stats">
    <div class="stat-card">
      <div class="stat-label">Total Orders</div>
      <div class="stat-value" id="stat-total">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Pending</div>
      <div class="stat-value pending" id="stat-pending">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Shipped</div>
      <div class="stat-value shipped" id="stat-shipped">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Delivered</div>
      <div class="stat-value delivered" id="stat-delivered">0</div>
    </div>
  </div>

  <!-- Orders Table -->
  <div class="panel-header">
    <span class="panel-title">Orders</span>
  </div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Customer</th>
          <th>Product</th>
          <th>Status</th>
          <th>Updated At</th>
        </tr>
      </thead>
      <tbody id="orders-body">
        <tr><td colspan="5" class="empty-state">Loading orders...</td></tr>
      </tbody>
    </table>
  </div>

  <!-- Event Log -->
  <div class="panel-header">
    <span class="panel-title">Live Event Log</span>
    <button class="clear-btn" onclick="clearLog()">Clear</button>
  </div>
  <div id="event-log">
    <div class="empty-state">Waiting for events...</div>
  </div>

</div>

<!-- Disconnection banner -->
<div id="conn-banner">⚠ WebSocket disconnected — retrying...</div>

<script>
  // ── State ──────────────────────────────────────────────────────────────────
  let orders = {};   // keyed by order id

  // ── Fetch initial orders on load ──────────────────────────────────────────
  async function loadOrders() {
    try {
      const res = await fetch('http://localhost:8000/orders');
      const data = await res.json();
      data.forEach(o => { orders[o.id] = o; });
      renderTable();
      updateStats();
    } catch (e) {
      console.error('Could not load initial orders:', e);
    }
  }

  // ── Render the orders table ───────────────────────────────────────────────
  function renderTable(flashId = null, flashType = 'new') {
    const tbody = document.getElementById('orders-body');
    const sorted = Object.values(orders).sort((a, b) =>
      new Date(b.updated_at) - new Date(a.updated_at)
    );

    if (sorted.length === 0) {
      tbody.innerHTML = '<tr><td colspan="5" class="empty-state">No orders yet. Insert one via psql to see it appear here.</td></tr>';
      return;
    }

    tbody.innerHTML = sorted.map(o => `
      <tr id="row-${o.id}" class="${flashId === o.id ? 'flash-' + flashType : ''}">
        <td class="id-col">#${o.id}</td>
        <td class="name-col">${escape(o.customer_name)}</td>
        <td>${escape(o.product_name)}</td>
        <td><span class="badge ${o.status}">${o.status}</span></td>
        <td class="time-col">${formatTime(o.updated_at)}</td>
      </tr>
    `).join('');
  }

  // ── Update stat counters ──────────────────────────────────────────────────
  function updateStats() {
    const vals = Object.values(orders);
    document.getElementById('stat-total').textContent     = vals.length;
    document.getElementById('stat-pending').textContent   = vals.filter(o => o.status === 'pending').length;
    document.getElementById('stat-shipped').textContent   = vals.filter(o => o.status === 'shipped').length;
    document.getElementById('stat-delivered').textContent = vals.filter(o => o.status === 'delivered').length;
  }

  // ── Append to event log ───────────────────────────────────────────────────
  function logEvent(op, order) {
    const log = document.getElementById('event-log');

    // Remove empty state
    const empty = log.querySelector('.empty-state');
    if (empty) empty.remove();

    const entry = document.createElement('div');
    entry.className = 'log-entry';

    let msg = '';
    if (op === 'INSERT')
      msg = `New order for <strong>${escape(order.customer_name)}</strong> — ${escape(order.product_name)}`;
    else if (op === 'UPDATE')
      msg = `Order #${order.id} status → <strong>${order.status}</strong>`;
    else if (op === 'DELETE')
      msg = `Order #${order.id} removed (<strong>${escape(order.customer_name)}</strong>)`;

    entry.innerHTML = `
      <span class="log-time">${new Date().toLocaleTimeString()}</span>
      <span class="log-op ${op}">${op}</span>
      <span class="log-msg">${msg}</span>
    `;

    log.prepend(entry);

    // Keep max 50 entries
    const entries = log.querySelectorAll('.log-entry');
    if (entries.length > 50) entries[entries.length - 1].remove();
  }

  // ── Handle incoming WebSocket message ────────────────────────────────────
  function handleMessage(raw) {
    let event;
    try { event = JSON.parse(raw); } catch { return; }

    const { operation, data } = event;

    if (operation === 'INSERT' || operation === 'UPDATE') {
      orders[data.id] = data;
      renderTable(data.id, 'new');
    } else if (operation === 'DELETE') {
      renderTable(data.id, 'delete');
      setTimeout(() => {
        delete orders[data.id];
        renderTable();
      }, 600);
    }

    updateStats();
    logEvent(operation, data);

    document.getElementById('last-update').textContent =
      'Last update: ' + new Date().toLocaleTimeString();
  }

  // ── WebSocket connection with auto-reconnect ──────────────────────────────
  let ws;
  let reconnectTimer;

  function connect() {
    ws = new WebSocket('ws://localhost:8000/ws');

    ws.onopen = () => {
      document.getElementById('dot').className = 'dot connected';
      document.getElementById('ws-label').textContent = 'LIVE';
      document.getElementById('conn-banner').style.display = 'none';
      clearTimeout(reconnectTimer);
    };

    ws.onmessage = (e) => handleMessage(e.data);

    ws.onclose = () => {
      document.getElementById('dot').className = 'dot error';
      document.getElementById('ws-label').textContent = 'DISCONNECTED';
      document.getElementById('conn-banner').style.display = 'block';
      reconnectTimer = setTimeout(connect, 3000);
    };

    ws.onerror = () => ws.close();
  }

  // ── Helpers ───────────────────────────────────────────────────────────────
  function escape(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }

  function formatTime(ts) {
    if (!ts) return '—';
    return new Date(ts).toLocaleString();
  }

  function clearLog() {
    document.getElementById('event-log').innerHTML =
      '<div class="empty-state">Log cleared.</div>';
  }

  // ── Init ──────────────────────────────────────────────────────────────────
  loadOrders();
  connect();
</script>
</body>
</html>
